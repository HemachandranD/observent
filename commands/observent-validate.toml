description = "Validate observability setup for a backend (phoenix | langfuse | signoz | elastic-apm | langsmith | all)"
prompt = """
Run the observent validation script for the specified backend.

Arguments: {{args}}
  - Backend: phoenix | langfuse | signoz | elastic-apm | langsmith | all  (or a comma-separated list, e.g. "phoenix,langsmith")
  - Optional flag: --smoke-test  (emits a synthetic LLM span to confirm end-to-end ingestion)

Execute:
  !`python "${CLAUDE_SKILL_DIR}/scripts/validate_setup.py" {{args}}`

Surface the script output verbatim. If validation fails, explain the likely cause (missing env var, unreachable endpoint, missing package) and suggest the fix. If it passes and the user wants a live trace, offer to rerun with --smoke-test.
"""
