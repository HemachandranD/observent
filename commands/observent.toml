description = "Wire up observability for a multi-agent Python app (Arize Phoenix / Langfuse / SigNoz / Elastic APM / LangSmith / Opik / Jaeger) — spec-driven lifecycle"
prompt = """
Run the observent observability setup for this project as a spec-driven lifecycle.

Arguments (optional): {{args}}
  - First arg: framework  (langgraph | crewai | microsoft-agent-framework | anthropic-agents | openai-agents | smolagents | llama-index | custom)
  - Second arg: backend(s) — one or more, comma-separated  (phoenix | langfuse | signoz | elastic-apm | langsmith | opik | jaeger; e.g. "phoenix" or "phoenix,jaeger")

Execute the full SDD lifecycle from the observent skill: Spec → Plan → Tasks → Implement. Each phase persists its artifact under `.observent/` in the user's project.

**Before anything else: resume check.** If `.observent/tasks.json` exists with any non-terminal task (`pending` or `failed`), prompt: `Found incomplete observent run. Resume from task <id> (<kind>)? (yes / restart / abort)`. Honor the answer.

If no resume is needed, run drift detection (project_fingerprint, spec_fingerprint, plan_fingerprint per `references/spec_schema.md § 4`) and (re)generate stale artifacts before executing tasks.

The four phase commands (`/observent-spec`, `/observent-plan`, `/observent-tasks`, `/observent-implement`) are also available individually for finer-grained control.
"""
