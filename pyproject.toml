[tool.ruff]
# observent ships zero-dependency stdlib scripts targeting Python 3.10+.
target-version = "py310"
line-length = 110
# tests/test_workflows/ is a manual demo-agent test bed (not shipped, not in the
# pytest suite — see addopts below); keep it out of lint too so the runnable demo
# apps aren't held to the plugin scripts' import-order rules.
extend-exclude = ["tests/test_workflows"]

[tool.ruff.lint]
# E/F = pyflakes + pycodestyle (ruff defaults), I = import order,
# UP = pyupgrade, B = bugbear. Kept deliberately tight — the scripts are the
# load-bearing logic of the plugin.
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
# tests/test_workflows/ is a manual test bed (runnable demo agent apps), not a
# pytest suite — exclude it from collection.
addopts = "-ra --ignore=tests/test_workflows"
