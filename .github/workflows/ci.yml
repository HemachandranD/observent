name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install lint/type-check/test tools
        # Pinned for reproducible CI — a floating ruff/mypy release must not turn
        # an unrelated PR red. Bump deliberately (mirrors the project's own
        # supply-chain pinning discipline in CLAUDE.md). pyyaml stays on a
        # compatible range because Debian/CI may pre-provide it.
        run: >-
          python -m pip install --upgrade pip
          "ruff==0.15.8"
          "mypy==1.19.1"
          "pytest==8.3.5"
          "pyyaml>=6.0,<7"
          "tomli; python_version < '3.11'"

      - name: Validate plugin manifests
        shell: python {0}
        run: |
          import json
          p = json.load(open(".claude-plugin/plugin.json", encoding="utf-8"))
          assert p.get("name") == "observent", f"plugin.json: name mismatch: {p.get('name')}"
          assert "description" in p and "author" in p and "url" in p["author"]
          print("OK: .claude-plugin/plugin.json")

          m = json.load(open(".claude-plugin/marketplace.json", encoding="utf-8"))
          assert "$schema" in m, "marketplace.json: missing $schema"
          assert m.get("name") == "observent", f"marketplace.json: name mismatch: {m.get('name')}"
          assert "plugins" in m and len(m["plugins"]) >= 1, "marketplace.json: no plugins listed"
          print("OK: .claude-plugin/marketplace.json")

      - name: Validate command TOML files
        shell: python {0}
        run: |
          import sys
          from pathlib import Path
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib  # type: ignore[no-redef]
          for path in sorted(Path("commands").glob("*.toml")):
              with path.open("rb") as f:
                  data = tomllib.load(f)
              assert "description" in data, f"{path}: missing 'description'"
              assert "prompt" in data, f"{path}: missing 'prompt'"
              print(f"OK: {path}")

      - name: Import scripts (no extra deps required)
        shell: python {0}
        run: |
          import importlib.util, sys
          for path in [
              "skills/observent/scripts/detect_framework.py",
              "skills/observent/scripts/validate_setup.py",
              "skills/observent/scripts/existing_setup.py",
              "scripts/detect_providers.py",
          ]:
              spec = importlib.util.spec_from_file_location("m", path)
              assert spec and spec.loader, path
              mod = importlib.util.module_from_spec(spec)
              sys.modules["m"] = mod
              spec.loader.exec_module(mod)
              print(f"OK: {path}")

      - name: Validate SKILL.md frontmatter
        shell: python {0}
        run: |
          import yaml
          text = open("skills/observent/SKILL.md", encoding="utf-8").read()
          assert text.startswith("---\n"), "SKILL.md must start with YAML frontmatter"
          end = text.find("\n---\n", 4)
          assert end != -1, "SKILL.md frontmatter must close with ---"
          fm = yaml.safe_load(text[4:end])
          assert fm.get("name") == "observent", f"name must be 'observent', got {fm.get('name')}"
          assert "description" in fm and len(fm["description"]) > 50
          assert len(fm["description"]) <= 1536, "description too long for Claude Code"
          print("OK: SKILL.md frontmatter")

      - name: Run detect_framework.py against this repo
        run: python skills/observent/scripts/detect_framework.py

      - name: Run existing_setup.py against this repo
        run: python skills/observent/scripts/existing_setup.py

      - name: Run detect_providers.py (smoke test)
        run: python scripts/detect_providers.py

      - name: validate_setup.py argparse smoke test
        run: python skills/observent/scripts/validate_setup.py --help

      - name: Installer dry-run (bash)
        if: runner.os == 'Linux'
        run: bash install.sh --dry-run --project-dir /tmp/observent-test

      - name: Installer dry-run (PowerShell)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\install.ps1 -DryRun -ProjectDir "$env:RUNNER_TEMP\observent-test"

      - name: Unit tests + docs-consistency checks
        run: python -m pytest

      - name: Lint with ruff
        run: ruff check skills/observent/scripts/ scripts/ tests/

      - name: Type-check with mypy
        run: mypy skills/observent/scripts/ scripts/
