name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install lint/type-check/test tools
        # Pinned for reproducible CI — a floating ruff/mypy release must not turn
        # an unrelated PR red. Bump deliberately (mirrors the project's own
        # supply-chain pinning discipline in CLAUDE.md). pyyaml stays on a
        # compatible range because Debian/CI may pre-provide it.
        run: >-
          python -m pip install --upgrade pip
          "ruff==0.15.8"
          "mypy==1.19.1"
          "pytest==8.3.5"
          "pyyaml>=6.0,<7"
          "tomli; python_version < '3.11'"

      - name: Validate plugin manifests
        shell: python {0}
        run: |
          import json
          p = json.load(open(".claude-plugin/plugin.json", encoding="utf-8"))
          assert p.get("name") == "observent", f"plugin.json: name mismatch: {p.get('name')}"
          assert "description" in p and "author" in p and "url" in p["author"]
          print("OK: .claude-plugin/plugin.json")

          m = json.load(open(".claude-plugin/marketplace.json", encoding="utf-8"))
          assert "$schema" in m, "marketplace.json: missing $schema"
          assert m.get("name") == "observent", f"marketplace.json: name mismatch: {m.get('name')}"
          assert "plugins" in m and len(m["plugins"]) >= 1, "marketplace.json: no plugins listed"
          print("OK: .claude-plugin/marketplace.json")

          # npx skills (vercel-labs/skills) discovers the skill via this `skills`
          # array; every entry must resolve to a real SKILL.md.
          import os
          skills = m["plugins"][0].get("skills", [])
          assert skills, "marketplace.json: plugins[0] needs a 'skills' array for npx skills discovery"
          for s in skills:
              skill_md = os.path.join(s, "SKILL.md")
              assert os.path.isfile(skill_md), f"marketplace.json skills entry missing SKILL.md: {skill_md}"
          print("OK: marketplace.json skills -> SKILL.md")

          # Hook commands embed ${CLAUDE_PLUGIN_ROOT}/... script paths; a rename
          # silently breaks the hook for every user. Assert each one resolves.
          import re
          commands = [
              hook["command"]
              for groups in p.get("hooks", {}).values()
              for group in groups
              for hook in group.get("hooks", [])
              if hook.get("type") == "command"
          ]
          referenced = [
              mt.group(1)
              for cmd in commands
              for mt in re.finditer(r"\$\{CLAUDE_PLUGIN_ROOT\}/([^\"']+)", cmd)
          ]
          assert referenced, "plugin.json: no ${CLAUDE_PLUGIN_ROOT} hook script paths found"
          for rel in referenced:
              assert os.path.isfile(rel), f"plugin.json hook references missing file: {rel}"
          print("OK: plugin.json hook commands -> scripts")

      - name: Validate command TOML files
        shell: python {0}
        run: |
          import sys
          from pathlib import Path
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib  # type: ignore[no-redef]
          for path in sorted(Path("commands").glob("*.toml")):
              with path.open("rb") as f:
                  data = tomllib.load(f)
              assert "description" in data, f"{path}: missing 'description'"
              assert "prompt" in data, f"{path}: missing 'prompt'"
              print(f"OK: {path}")

      - name: Import scripts (no extra deps required)
        shell: python {0}
        run: |
          import importlib.util, os, sys
          # Put the scripts dir on sys.path so sibling imports (observent_matrix)
          # resolve — exactly as they do when a script is run as `python <file>`.
          sys.path.insert(0, os.path.abspath("skills/observent/scripts"))
          for path in [
              "skills/observent/scripts/observent_matrix.py",
              "skills/observent/scripts/detect_framework.py",
              "skills/observent/scripts/validate_setup.py",
              "skills/observent/scripts/existing_setup.py",
              "skills/observent/scripts/session_start_detect.py",
              "skills/observent/scripts/prompt_nudge.py",
              "skills/observent/scripts/posttooluse_validate.py",
          ]:
              spec = importlib.util.spec_from_file_location("m", path)
              assert spec and spec.loader, path
              mod = importlib.util.module_from_spec(spec)
              sys.modules["m"] = mod
              spec.loader.exec_module(mod)
              print(f"OK: {path}")

      - name: Validate SKILL.md frontmatter
        shell: python {0}
        run: |
          import yaml
          text = open("skills/observent/SKILL.md", encoding="utf-8").read()
          assert text.startswith("---\n"), "SKILL.md must start with YAML frontmatter"
          end = text.find("\n---\n", 4)
          assert end != -1, "SKILL.md frontmatter must close with ---"
          fm = yaml.safe_load(text[4:end])
          assert fm.get("name") == "observent", f"name must be 'observent', got {fm.get('name')}"
          assert "description" in fm and len(fm["description"]) > 50
          assert len(fm["description"]) <= 1536, "description too long for Claude Code"
          print("OK: SKILL.md frontmatter")

      - name: Run detect_framework.py against this repo
        run: python skills/observent/scripts/detect_framework.py

      - name: Run existing_setup.py against this repo
        run: python skills/observent/scripts/existing_setup.py

      - name: validate_setup.py argparse smoke test
        run: python skills/observent/scripts/validate_setup.py --help

      - name: Unit tests + docs-consistency checks
        run: python -m pytest

      - name: Lint with ruff
        run: ruff check skills/observent/scripts/ tests/

      - name: Type-check with mypy
        run: mypy skills/observent/scripts/
